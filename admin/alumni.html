<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Alumni - Admin Alumni SDN 1 Senteluk 2017</title>
  
  <link rel="icon" type="image/png" href="../assets/img/logo/logo.png">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="stylesheet" href="../assets/css/cards.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar Overlay (for mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-sidebar-header">
        <a href="dashboard.html" class="admin-logo">
          <div class="admin-logo-icon">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
              <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
            </svg>
          </div>
          <span>Admin Panel</span>
        </a>
      </div>
      
      <div class="admin-sidebar-menu">
        <div class="admin-menu-section">
          <div class="admin-menu-section-title">Menu</div>
          <a href="dashboard.html" class="admin-menu-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span>Dashboard</span>
          </a>
          <a href="alumni.html" class="admin-menu-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <span>Kelola Alumni</span>
          </a>
          <a href="agenda.html" class="admin-menu-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>Kelola Agenda</span>
          </a>
          <a href="galeri.html" class="admin-menu-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <span>Kelola Galeri</span>
          </a>
          <a href="settings.html" class="admin-menu-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
            <span>Pengaturan</span>
          </a>
        </div>
      </div>
      
      <div class="admin-sidebar-footer">
        <div class="admin-user">
          <div class="admin-user-avatar">A</div>
          <div class="admin-user-info">
            <div class="admin-user-name">Admin</div>
            <div class="admin-user-role">Administrator</div>
          </div>
          <a href="#" id="logout-btn" title="Logout">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </a>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <header class="admin-header">
        <div class="admin-header-left">
          <button class="admin-toggle" id="admin-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <div class="admin-breadcrumb">
            <a href="dashboard.html">Admin</a>
            <span>/</span>
            <span class="current">Kelola Alumni</span>
          </div>
        </div>
        
        <div class="admin-header-right">
          <button class="theme-toggle" title="Toggle Dark Mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
      </header>

      <div class="admin-content" id="admin-alumni">
        <div class="admin-page-header">
          <h1 class="admin-page-title">Kelola Alumni</h1>
          <p class="admin-page-subtitle">Kelola data alumni SDN 1 Senteluk 2017</p>
        </div>

        <div class="admin-card">
          <div class="admin-card-header">
            <h3 class="admin-card-title">Daftar Alumni</h3>
            <button class="btn btn-primary" onclick="AdminAlumni.add()">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              Tambah Alumni
            </button>
          </div>
          <div class="table-responsive">
            <table>
              <thead>
                <tr>
                  <th>Nama</th>
                  <th>Pekerjaan</th>
                  <th>Tahun Lulus</th>
                  <th>Status</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="alumni-table-body">
                <!-- Data akan dimuat di sini -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Form -->
  <div class="modal" id="alumni-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Tambah Alumni</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <form id="alumni-form" class="admin-form">
          <div class="admin-form-group">
            <label class="admin-form-label required">Nama</label>
            <input type="text" id="alumni-nama" class="admin-form-input" placeholder="Nama lengkap alumni" required>
          </div>
          
          <div class="admin-form-row">
            <div class="admin-form-group">
              <label class="admin-form-label required">Jenis Kelamin</label>
              <select id="alumni-jenis-kelamin" class="admin-form-input" required>
                <option value="">Pilih Jenis Kelamin</option>
                <option value="Laki-laki">Laki-laki</option>
                <option value="Perempuan">Perempuan</option>
              </select>
            </div>
            <div class="admin-form-group">
              <label class="admin-form-label">Tahun Lulus</label>
              <input type="text" id="alumni-tahun" class="admin-form-input" placeholder="2017">
            </div>
          </div>
          
          <div class="admin-form-group">
            <label class="admin-form-label">Alamat</label>
            <textarea id="alumni-alamat" class="admin-form-input" placeholder="Alamat lengkap alumni" rows="2"></textarea>
          </div>
          
          <div class="admin-form-group">
            <label class="admin-form-label">Pekerjaan</label>
            <input type="text" id="alumni-pekerjaan" class="admin-form-input" placeholder="Pekerjaan saat ini">
          </div>
          
          <div class="admin-form-row">
            <div class="admin-form-group">
              <label class="admin-form-label">Email</label>
              <input type="email" id="alumni-email" class="admin-form-input" placeholder="email@example.com">
            </div>
            <div class="admin-form-group">
              <label class="admin-form-label">WhatsApp</label>
              <input type="text" id="alumni-whatsapp" class="admin-form-input" placeholder="+6281234567890">
            </div>
          </div>
          
          <div class="admin-form-row">
            <div class="admin-form-group">
              <label class="admin-form-label">Facebook</label>
              <input type="text" id="alumni-facebook" class="admin-form-input" placeholder="Facebook URL">
            </div>
            <div class="admin-form-group">
              <label class="admin-form-label">Instagram</label>
              <input type="text" id="alumni-instagram" class="admin-form-input" placeholder="@username">
            </div>
          </div>
          
          <div class="admin-form-group">
            <label class="admin-form-label">TikTok</label>
            <input type="text" id="alumni-tiktok" class="admin-form-input" placeholder="@username">
          </div>
          
          <div class="admin-form-group">
            <label class="admin-form-label">Status</label>
            <select id="alumni-status" class="admin-form-input">
              <option value="Aktif">Aktif</option>
              <option value="Tidak Aktif">Tidak Aktif</option>
            </select>
          </div>
          
          <div class="admin-form-group">
            <label class="admin-form-label">Foto Profil</label>
            <div class="image-upload-container">
              <div class="image-preview-wrapper">
                <img id="alumni-foto-preview" src="assets/img/alumni/default.svg" alt="Preview" class="image-preview">
              </div>
              <input type="file" id="alumni-foto-upload" class="admin-form-input" accept="image/*">
              <p class="form-hint">Ukuran maksimal: 5MB. Format: JPG, PNG, GIF</p>
            </div>
          </div>
          
          <div class="admin-form-actions">
            <button type="button" class="btn btn-outline" onclick="Modal.hide('alumni-modal')">Batal</button>
            <button type="submit" class="btn btn-primary">Simpan</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="Lightbox.close()">&times;</button>
    <button class="lightbox-prev" onclick="Lightbox.navigate(-1)">&#10094;</button>
    <button class="lightbox-next" onclick="Lightbox.navigate(1)">&#10095;</button>
    <img class="lightbox-image" src="" alt="">
    <div class="lightbox-caption">
      <h3 class="lightbox-title"></h3>
      <p class="lightbox-description"></p>
      <p class="lightbox-date"></p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/upload.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>
</html>
